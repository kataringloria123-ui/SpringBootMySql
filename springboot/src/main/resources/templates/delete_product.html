<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delete Product</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css">
</head>

<style>
    table, th,td {padding: 10px}
</style>
<body>
<div align="center">
    <h2>Delete Product</h2>
    <br/>
    <form action="#" th:action="@{/save_delete}" th:object="${product}" method="post">
        <table>
            <tr>
                <td>ID:</td>
                <td><input type="text" th:field="*{id}" readonly="readonly" ></td>
            </tr>

            <tr>
                <td>Name:</td>
                <td><input type="text" th:field="*{name}" ></td>
            </tr>

            <tr>
                <td>Category:</td>
                <td><input type="text" th:field="*{category}"></td>
            </tr>

            <tr>
                <td colspan="2"><button class="btn btn-primary">Delete</button></td>
            </tr>
        </table>
    </form>
</div>
</body>
</html>
